# fly.io config for the golf server.
#
# First deploy:
#   fly launch --copy-config --no-deploy   # creates the app, keeps this file
#   fly deploy
#   fly scale count 1                      # rooms are in-memory: exactly ONE machine
#
# Pick your app name and region below (or let `fly launch` rewrite them).

app = "golf-card-game"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # Machines may stop when fully idle to save money. Open WebSockets count as
  # activity, so a table mid-game keeps the machine alive; idle rooms are
  # GC'd server-side after 30 minutes anyway. Set min_machines_running = 1
  # if you'd rather never cold-start.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[env]
  # GOLF_ROOM_GC_SECS = "1800"
  # GOLF_BOT_STEP_MS = "700"
